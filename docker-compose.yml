version: "3.9"

services:
  # ── Main App ────────────────────────────────────────────────────────────────
  taxlegal:
    build:
      context: .
      dockerfile: Dockerfile
    image: taxlegal-ai:latest
    container_name: taxlegal
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DBVNTAX_DATABASE_URL=${DBVNTAX_DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - TEMPORAL_HOST=${TEMPORAL_HOST:-temporal:7233}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-vuhoang04@gmail.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@123456}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL1=${OPENROUTER_MODEL1}
      - OPENROUTER_MODEL2=${OPENROUTER_MODEL2}
      - OPENROUTER_MODEL3=${OPENROUTER_MODEL3}
      - OPENROUTER_MODEL4=${OPENROUTER_MODEL4}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - PERPLEXITY_SEARCH_MODEL=${PERPLEXITY_SEARCH_MODEL:-sonar}
      - CRAWLKIT_API_KEY=${CRAWLKIT_API_KEY}
      - APP_PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - taxlegal-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Temporal Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: taxlegal-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - TEMPORAL_HOST=${TEMPORAL_HOST:-temporal:7233}
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - taxlegal-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - worker  # only start with: docker compose --profile worker up

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taxlegal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - taxlegal-net

  # ── Temporal (optional — for full durable workflow support) ──────────────────
  # To enable: docker compose --profile temporal up
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: taxlegal-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER:-legaldb_user}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PWD}
      - POSTGRES_SEEDS=${TEMPORAL_POSTGRES_SEEDS:-host.docker.internal}
    networks:
      - taxlegal-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - temporal

  temporal-ui:
    image: temporalio/ui:2.26
    container_name: taxlegal-temporal-ui
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    networks:
      - taxlegal-net
    profiles:
      - temporal

volumes:
  redis_data:

networks:
  taxlegal-net:
    driver: bridge
